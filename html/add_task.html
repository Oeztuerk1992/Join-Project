<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>
    <link rel="stylesheet" href="../styles/add_task.css">
</head>
<body>

    <div class="app">

        <!-- Sidebar wird später geladen -->
        <aside id="sidebar"></aside>

        <main class="content">

            <div class="header">

                <div></div>

                <div class="user-profile">
                    NAME
                </div>

            </div>

            <section class="add-task-container">

                <h1>Add Task</h1>

                <form id="addTaskForm">

                    <div class="form-wrapper">

                        <!-- LINKER BEREICH -->

                        <div class="left-side">

                            <div class="input-group">

                                <label>Title<span>*</span></label>

                                <input
                                    type="text"
                                    placeholder="Enter a title">

                            </div>

                            <div class="input-group">

                                <label>Description</label>

                                <textarea
                                    placeholder="Enter a Description"></textarea>

                            </div>

                            <div class="input-group">

                                <label>Due date<span>*</span></label>

                                <input type="date">

                            </div>

                        </div>

                        <div class="separator"></div>

                        <!-- RECHTER BEREICH -->

                        <div class="right-side">

                            <div class="input-group">

                                <label>Priority</label>

                                <div class="priority-container">

                                    <button type="button" class="priority urgent">
                                        Urgent
                                    </button>

                                    <button type="button" class="priority medium active">
                                        Medium
                                    </button>

                                    <button type="button" class="priority low">
                                        Low
                                    </button>

                                </div>

                            </div>

                            <div class="input-group">

                                <label>Assigned to</label>

                                <div class="dropdown">

                                    <span>Select contacts to assign</span>

                                    <img src="./assets/icons/arrow_drop_down.svg">

                                </div>

                            </div>

                            <div class="input-group">

                                <label>Category<span>*</span></label>

                                <div class="dropdown">

                                    <span>Select task category</span>

                                    <img src="./assets/icons/arrow_drop_down.svg">

                                </div>

                            </div>

                            <div class="input-group">

                                <label>Subtasks</label>

                                <div class="subtask-input">

                                    <input
                                        type="text"
                                        placeholder="Add new subtask">

                                    <button type="button">+</button>

                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="bottom-area">

                        <p><span>*</span>This field is required</p>

                        <div class="button-area">

                            <button
                                type="reset"
                                class="clear-btn">

                                Clear

                            </button>

                            <button
                                type="submit"
                                class="create-btn">

                                Create Task

                            </button>

                        </div>

                    </div>

                </form>

            </section>

        </main>

    </div>

</body>
</html>
