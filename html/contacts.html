<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
    <link rel="stylesheet" href="/styles/contact.css">
    <link rel="stylesheet" href="/styles/font.css">
    <link rel="stylesheet" href="/styles/colors.css">
  <link rel="icon"
      href="/assets/img/logo/favicon_light.svg"
      media="(prefers-color-scheme: dark)"
      type="image/svg+xml">

    <link rel="icon"
      href="/assets/img/logo/favicon_dark.svg"
      media="(prefers-color-scheme: light)"
      type="image/svg+xml">
</head>
<body>
    
    <main class="right-side">
        <div class="new-contact">
            <button class="btn_new_contact" onclick="openOverlay()" type="button">Add new contact <img class="person_add" src="/assets/icons/contact/person_add.png" alt=""></button>
            <div id="new-contact-message"></div>
        </div>        
        <div class="contact-info">
            <div class="contact-details">
                <div class="header-title">
                    <h2 class="title-contact">Contacts</h2>
                    <div class="title-divider"></div>
                    <span class="title-subtitle">Better with a team</span>
                </div>
            </div>
        </div>
    </main>
    <div class="overlay" id="overlay">
        <div class="overlay-container">
            <div class="overlay-left">
                <img class="join_logo" src="/assets/img/join-logo.png" alt="">
                <span class="add_title">Add contact</span>
                <span class="p-tag">Tasks are better with a team!</span>
                <span class="line"></span>
            </div>
            <div class="overlay-right">
                <span class="overlay-close" onclick="closeOverlay()">X</span>
                <div class="avatar-placeholder">
                    <img class="user" src="/assets/icons/contact/user.png" alt="">
                </div>
                <div class="input-container">
                    <div class="input-wrapper">
                        <input id="name" type="text" placeholder="Name" class="input-field" >
                        <img src="/assets/icons/contact/person.png" alt="" class="input-icon">
                    </div>
                    <div class="input-wrapper">
                        <input id="email" type="text" placeholder="Email" class="input-field">
                        <img src="/assets/icons/contact/mail.png" alt="" class="input-icon">
                    </div>
                    <div class="input-wrapper">
                        <input id="phone" type="text" placeholder="Phone" class="input-field">
                        <img src="/assets/icons/contact/call.png" alt="" class="input-icon">
                    </div>
                    <div class="overly-buttons">
                        <button class="btn-cancel" onclick="closeOverlay()">Cancel X</button>
                        <button id="create-contact" class="btn-create" onclick="createContact()">Create contact ✓</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/new_contact.js"></script>
    <script src="/js/templates/contact_template.js"></script>
</body>
</html>
