<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon"
      href="../assets/img/logo/favicon_light.svg"
      media="(prefers-color-scheme: dark)"
      type="image/svg+xml">

    <link rel="icon"
      href="../assets/img/logo/favicon_dark.svg"
      media="(prefers-color-scheme: light)"
      type="image/svg+xml">

    <title>Summary</title>
    
    <link rel="stylesheet" href="../styles/colors.css">
    <link rel="stylesheet" href="../styles/font.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../styles/summary.css">
</head>

<body>
  
  <header class="container-headline">
    <h1>Join 360</h1>
    <div class="seperator"></div>
    <h2>Key Metrics at a Glance</h2>
  </header>

  <main>
    <section class="container-do">

      <button id="btn-to-do" class="to-do do-one">
        <div class="img-to-do"></div>
        <div class="container-to-do">
            <div id="count-do" class="count">1</div>
            <h3 id="description-do" class="description">To-do</h3>
        </div>
      </button>

      <button id="btn-done" class="to-do do-two">
        <div class="img-done"></div>
        <div class="container-to-do">
          <div id="count-done" class="count">1</div>
          <h3 id="description-done" class="description">Done</h3>
        </div>
      </button>
    </section>

    <section class="container-urgent">
      <button id="btn-urgent" class="urgent">
        <div class="img-urgent"></div>
        <div class="urgent-content">
          <div id="count-urgent" class="count">1</div>
          <h3 id="description-urgent" class="description">Urgent</h3>
        </div>
        <div class="seperator-urgent"></div>
        <div class="timeline-urgent">
          <div class="date-urgent">October 16, 2022</div>
          <p class="info-deadline">Upcoming Deadline</p>
        </div>  
      </button>
      <h4 id="greeting-user" class="greeting">Good morning!</h3>
    </section>

    <section class="container-tasks">
      <button id="btn-tasks-in-board" class="tasks task-one">
        <div class="count">5</div>
        <h3 class="description">Tasks in<br>Board</h3>
      </button>

      <button id="btn-tasks-in-progress" class="tasks task-two">
        <div class="count">2</div>
        <h3 class="description">Tasks in Progress</h3>
      </button>

      <button id="btn-awaiting-feedback" class="tasks task-three">
        <div class="count">2</div>
        <h3 class="description">Awaiting Feedback</h3>
      </button>
    </section>
  </main>

</body>

</html>
